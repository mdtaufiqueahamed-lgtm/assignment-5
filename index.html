<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<!-- Login Box -->
<div class="bg-white p-10 rounded-xl shadow-lg w-96">

<!-- Logo -->
<div class="flex justify-center mb-4">
<img src="./assets/github-logo.png" class="w-16">
</div>

<!-- Title -->
<h2 class="text-2xl font-bold text-center">
GitHub Issues Tracker
</h2>

<p class="text-center text-gray-500 mb-6">
Sign in to manage your issues
</p>

<!-- Username -->
<h3 class="font-semibold mb-1">Username</h3>

<input
id="username"
type="text"
placeholder="Enter Username"
class="border w-full p-2 rounded mb-3"
/>

<!-- Password -->
<h3 class="font-semibold mb-1">Password</h3>

<input
id="password"
type="password"
placeholder="Enter Password"
class="border w-full p-2 rounded mb-4"
/>

<!-- Login Button -->
<button
id="login-btn"
class="bg-blue-600 hover:bg-blue-700 text-white w-full py-2 rounded-lg">

Sign In

</button>

<!-- Demo -->
<p class="text-xs text-gray-400 text-center mt-3">
Demo: admin / admin123
</p>

</div>

<script src="script.js"></script>

</body>
</html>
