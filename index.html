<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  
</head>
<body class="bg-gray-100">

  <!--  LOGIN PAGE -->
  <section id="login-page" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
      <div class="text-center mb-6">
        <img class="mx-auto" src="./assets/github-logo.png " alt="">
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-gray-500">Sign in to manage your issues</p>
      </div>
      <h2 class="text-[#1F2937] text-xl py-1">Username</h2>
      <input id="username" type="text" placeholder="Username" class="w-full p-2 mb-4 border rounded">
      <h2 class="text-[#1F2937] text-xl py-1">Password</h2>
      <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-4 border rounded">
      <button id="loginBtn" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Sign In</button>
      <p class="text-gray-500 text-sm mt-4">
        Demo: <br>Username: admin <br>Password: admin123
      </p>
      <p id="login-error" class="text-red-500 mt-2 text-sm hidden">Invaild Username Or Password</p>
    </div>
  </section>

  <!--  MAIN PAGE  -->
  <section id="main-page" class="hidden flex flex-col min-h-screen">

    <!-- NAVBAR  -->
    <section class="bg-white shadow p-4 flex justify-between items-center">
      
        <div class="flex gap-2 items-center ">
        <img class="w-[36px]" src="./assets/github-logo.png" alt="">
        <h1 class="font-bold text-xl">GitHub Issues Tracker</h1>
      </div>
      
      <div class="flex gap-2">
        <input id="searchInput" type="text" placeholder="Search issues..." class="p-2 border rounded">
        <button id="searchBtn" class="bg-blue-500 text-white px-3 rounded hover:bg-blue-600"><i class="fa-solid fa-plus"></i>New Issue</button>
      </div>
      
      
    </section>

    <!--  TABS  -->
    <section class="bg-white shadow mt-2 mx-4 p-4 rounded flex flex-start gap-4 items-center">
      <button class="tab-btn px-5 py-1 bg-blue-500 text-white rounded" data-status="all">All</button>
      <button class="tab-btn px-5 py-1 bg-gray-200 rounded" data-status="open">Open</button>
      <button class="tab-btn px-5 py-1 bg-gray-200 rounded" data-status="closed">Closed</button>
    </section>

    <!-- count section  -->
     <section class="bg-white shadow mt-2 mx-4 p-4 rounded flex justify-between items-center">
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
      <i class="fa-solid fa-circle-nodes text-xl"></i>
    </div>
    <div>
      <h2 id="issue-count" class="text-2xl font-bold text-gray-800">0 Issues</h2>
      <p class="text-gray-500 text-sm">Track and manage your project issues</p>
    </div>
  </div>

  <div class="flex gap-4 text-sm font-medium">
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 bg-green-500 rounded-full"></span>
      <span>Open</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
      <span>Closed</span>
    </div>
  </div>
</section>

    <!-- ISSUES GRID  -->
    <section id="issues-container" class="p-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <!-- Cards dynamically inserted -->
    </section>

    <!--  LOADING SPINNER  -->
    <section id="loading" class="hidden text-center my-8">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mx-auto animate-spin"></div>
      <p class="mt-2 text-gray-500">Loading...</p>
    </section>

  </section>

  <!--  MODAL  -->
  <section id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded shadow-md w-full max-w-lg relative">
      <button id="closeModal" class="absolute top-2 right-2 text-gray-500 hover:text-gray-900 font-bold">&times;</button>
      <h2 class="text-xl font-bold mb-2" id="modal-title"></h2>
      <p id="modal-desc" class="mb-2"></p>
      <p id="modal-info" class="text-gray-600 text-sm"></p>
    </div>
  </section>
<script src="./script.js"></script>
</body>
</html>
